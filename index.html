<!DOCTYPE html>
<html>
<head>
  <title>Research Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #555; }
    button {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:disabled { background: #999; cursor: not-allowed; }
    .result {
      margin-top: 24px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #333;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Research Agent</h1>
    <p>Ask about anything current and get a summary.</p>
    <input id="topic" type="text" placeholder="e.g. What's happening with AI in 2026?" />
    <button id="btn" onclick="research()">Research →</button>
    <div class="result" id="result"></div>
  </div>
  <script>
    document.getElementById('topic').addEventListener('keydown', e => {
      if (e.key === 'Enter') research();
    });
    async function research() {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) return;
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = 'Researching...';
      result.style.display = 'none';
      try {
        const res = await fetch('/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        });
        const data = await res.json();
        result.textContent = data.result;
        result.style.display = 'block';
      } catch (e) {
        result.textContent = 'Something went wrong. Try again.';
        result.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Research →';
    }
  </script>
</body>
</html>
